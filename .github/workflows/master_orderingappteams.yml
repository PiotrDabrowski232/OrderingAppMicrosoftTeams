name: Build and Deploy ASP.NET Core App - OrderingAppTeams

on:
  push:
    branches:
      - main  # Specify the branch to trigger this workflow
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  # Using Ubuntu for .NET Core and Node.js

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'  # Specify the .NET SDK version you need

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Publish .NET Core Application
        run: dotnet publish -c Release -o myapp

      - name: Upload Artifact for Deployment
        uses: actions/upload-artifact@v4
        with:
          name: aspnetcore-app
          path: myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifact from Build Job
        uses: actions/download-artifact@v4
        with:
          name: aspnetcore-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_SERVICE_PRINCIPAL_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'OrderingAppTeams'
          package: myapp  # Path to the published app directory
